# AWS deployment: RDS Postgres + S3 + Glue catalog.
# Uses IAM roles for service accounts (IRSA) — no static credentials.
#
# Prerequisites:
#   1. RDS Postgres with wal_level=logical
#   2. S3 bucket for warehouse
#   3. IAM role with S3 + Glue permissions, annotated on the service account
#   4. Secret with Postgres URL:
#      kubectl create secret generic pg2iceberg-pg --from-literal=POSTGRES_URL='postgresql://...'
#
# Install:
#   helm install pg2iceberg oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-aws.yaml

mode: combined

image:
  repository: ghcr.io/pg2iceberg/pg2iceberg
  tag: "0.1.0"

postgres:
  existingSecret: pg2iceberg-pg
  existingSecretKeys:
    url: POSTGRES_URL

tables: "public.orders,public.customers,public.payments"

replicationMode: logical

catalog:
  url: https://glue.us-east-1.amazonaws.com/iceberg
  auth: sigv4
  credentialMode: iam

warehouse: "s3://my-data-lake/warehouse/"
namespace: myapp

s3:
  region: us-east-1
  # No endpoint, accessKey, or secretKey — uses IRSA.

writer:
  podAnnotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/pg2iceberg-role
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi

goMemLimit: "1600MiB"

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
