# Multi-database setup: one Helm release per Postgres database.
# This file is for the "orders" database. See values-multi-db-users.yaml for the other.
#
# Install both:
#   helm install pg2iceberg-users oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-multi-db-users.yaml
#   helm install pg2iceberg-orders oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-multi-db-orders.yaml

mode: combined

image:
  repository: ghcr.io/pg2iceberg/pg2iceberg
  tag: "0.1.0"

postgres:
  url: postgresql://postgres:postgres@orders-db.default.svc:5432/orders

tables: "public.orders,public.line_items,public.payments"

replicationMode: logical
logical:
  slotName: pg2iceberg_orders
  publicationName: pg2iceberg_orders_pub

catalog:
  url: http://iceberg-rest.default.svc:8181

warehouse: "s3://warehouse/"
namespace: orders

s3:
  endpoint: http://minio.default.svc:9000
  accessKey: admin
  secretKey: password
  region: us-east-1

writer:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
