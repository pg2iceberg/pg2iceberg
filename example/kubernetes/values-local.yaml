# Local testing with kind.
# Infrastructure (Postgres, MinIO, Iceberg REST) runs via docker-compose,
# accessible from kind pods via the host gateway.
#
# See test-local.sh for the full setup script.

mode: combined

image:
  repository: pg2iceberg
  tag: local
  pullPolicy: Never  # loaded directly into kind

postgres:
  url: postgresql://postgres:postgres@host-gateway:5502/rideshare

tables: "public.riders,public.drivers,public.rides,public.payments,public.ratings"

replicationMode: logical
logical:
  slotName: pg2iceberg_slot
  publicationName: pg2iceberg_pub

catalog:
  url: http://host-gateway:8181

warehouse: "s3://warehouse/"
namespace: rideshare

s3:
  endpoint: http://host-gateway:9000
  accessKey: admin
  secretKey: password
  region: us-east-1
