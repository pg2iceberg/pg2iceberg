# Horizontal scaling: one WAL writer pod + N materializer pods.
# Materializers claim tables via heartbeat locks and scale independently.
#
# Install:
#   helm install pg2iceberg oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-horizontal.yaml
#
# Scale materializers:
#   kubectl scale deployment pg2iceberg-materializer --replicas=4

mode: horizontal

image:
  repository: ghcr.io/pg2iceberg/pg2iceberg
  tag: "0.1.0"

postgres:
  url: postgresql://postgres:postgres@postgres.default.svc:5432/mydb

tables: "public.orders,public.customers,public.payments,public.events,public.users"

replicationMode: logical
logical:
  slotName: pg2iceberg_slot
  publicationName: pg2iceberg_pub

catalog:
  url: http://iceberg-rest.default.svc:8181

warehouse: "s3://warehouse/"
namespace: myapp

s3:
  endpoint: http://minio.default.svc:9000
  accessKey: admin
  secretKey: password
  region: us-east-1

config:
  sink:
    flush_interval: 10s
    flush_rows: 1000
    materializer_interval: 10s

writer:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi

materializer:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
