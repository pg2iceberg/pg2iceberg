# Multi-database setup: one Helm release per Postgres database.
# This file is for the "users" database. See values-multi-db-orders.yaml for the other.
#
# Install both:
#   helm install pg2iceberg-users oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-multi-db-users.yaml
#   helm install pg2iceberg-orders oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-multi-db-orders.yaml
#
# Each release gets its own Deployment, replication slot, and Iceberg namespace.
# Use distinct slotName and publicationName per release to avoid collisions.

mode: combined

image:
  repository: ghcr.io/pg2iceberg/pg2iceberg
  tag: "0.1.0"

postgres:
  url: postgresql://postgres:postgres@users-db.default.svc:5432/users

tables: "public.accounts,public.profiles,public.sessions"

replicationMode: logical
logical:
  slotName: pg2iceberg_users
  publicationName: pg2iceberg_users_pub

catalog:
  url: http://iceberg-rest.default.svc:8181

warehouse: "s3://warehouse/"
namespace: users

s3:
  endpoint: http://minio.default.svc:9000
  accessKey: admin
  secretKey: password
  region: us-east-1

writer:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
