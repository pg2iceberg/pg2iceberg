# Combined mode: single pod runs WAL writer + materializer.
# This is the simplest deployment — one pod does everything.
#
# Install:
#   helm install pg2iceberg oci://ghcr.io/pg2iceberg/charts/pg2iceberg -f values-combined.yaml

mode: combined

image:
  repository: ghcr.io/pg2iceberg/pg2iceberg
  tag: "0.1.0"

postgres:
  url: postgresql://postgres:postgres@postgres.default.svc:5432/mydb

tables: "public.orders,public.customers,public.payments"

replicationMode: logical
logical:
  slotName: pg2iceberg_slot
  publicationName: pg2iceberg_pub

catalog:
  url: http://iceberg-rest.default.svc:8181

warehouse: "s3://warehouse/"
namespace: myapp

s3:
  endpoint: http://minio.default.svc:9000
  accessKey: admin
  secretKey: password
  region: us-east-1

# Optional: tune flush behavior via config file.
config:
  sink:
    flush_interval: 10s
    flush_rows: 1000
    flush_bytes: 67108864  # 64MB

writer:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
